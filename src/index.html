<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>Simplifica CRM - Staff Portal</title>
    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <!-- Force the browser to revalidate the HTML on every load so the
         Service Worker cannot serve a stale index.html that points to
         old bundle names. Without this, a previously-installed SW
         would keep the user pinned to the old bundle version even
         after new code is deployed. -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <!-- SECURITY: Prevent indexing -->
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="googlebot" content="noindex, nofollow" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Simplifica CRM" />

    <link rel="manifest" href="manifest.json" />

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="favicon.ico" />

    <link
      rel="stylesheet"
      integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Fonts served locally (no external CDN) -->

    <meta name="theme-color" content="#6366f1" />
    <meta name="msapplication-TileColor" content="#6366f1" />

    <meta name="description" content="Simplifica CRM - Staff Portal" />
    <meta name="keywords" content="CRM, gestión, clientes, tickets" />
    <meta name="author" content="Simplifica Team" />

    <meta property="og:title" content="Simplifica CRM - Staff Portal" />
    <meta property="og:description" content="Simplifica CRM - Staff Portal" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="/" />
    <meta property="og:image" content="/favicon.ico" />
    <link rel="manifest" href="manifest.webmanifest" />
  </head>

  <body>
    <script src="/init.js"></script>
    <app-root></app-root>
    <noscript>Please enable JavaScript to continue using this application.</noscript>
  </body>
</html>
