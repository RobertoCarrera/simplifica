<!-- Fullscreen overlay -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-4 md:p-8">
  <!-- Backdrop -->
  <div
    class="fixed inset-0 bg-black/60 backdrop-blur-sm transition-opacity"
    (click)="close.emit()"
  ></div>

  <!-- Modal panel -->
  <div class="relative z-10 w-full max-w-5xl max-h-[90vh] flex flex-col bg-white dark:bg-slate-800 rounded-2xl shadow-2xl overflow-hidden">
    
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-slate-700 flex-shrink-0">
      <div class="flex items-center gap-3">
        <div class="w-9 h-9 rounded-lg bg-blue-100 dark:bg-blue-900/40 flex items-center justify-center">
          <i class="fas fa-signature text-blue-600 dark:text-blue-400"></i>
        </div>
        <div>
          <h3 class="text-lg font-semibold text-gray-900 dark:text-white">Editar firma</h3>
          <p class="text-sm text-gray-500 dark:text-gray-400">{{ account.email }}</p>
        </div>
      </div>
      <button
        class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 transition-colors cursor-pointer"
        (click)="close.emit()"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Body: Editor + Preview side by side -->
    <div class="flex-1 overflow-hidden flex flex-col md:flex-row">
      
      <!-- Editor panel -->
      <div class="md:w-2/5 flex flex-col border-b md:border-b-0 md:border-r border-gray-200 dark:border-slate-700">
        <div class="px-5 py-3 border-b border-gray-100 dark:border-slate-700/50">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
            <i class="fas fa-pen-nib mr-1.5 text-gray-400"></i>
            Texto de la firma
          </label>
        </div>
        <div class="flex-1 p-5">
          <textarea
            class="w-full h-full min-h-[160px] resize-none rounded-lg border border-gray-300 dark:border-slate-600 bg-gray-50 dark:bg-slate-900/50 text-gray-900 dark:text-white px-4 py-3 text-sm leading-relaxed focus:ring-2 focus:ring-blue-500 focus:border-blue-500 dark:focus:ring-blue-400 dark:focus:border-blue-400 outline-none transition-shadow placeholder:text-gray-400 dark:placeholder:text-gray-500"
            [ngModel]="signatureText()"
            (ngModelChange)="signatureText.set($event)"
            placeholder="Ej: Saludos cordiales,&#10;Dr. García&#10;Clínica Dental Sonrisa"
          ></textarea>
        </div>
      </div>

      <!-- Preview panel -->
      <div class="md:w-3/5 flex flex-col bg-slate-50 dark:bg-slate-900/40">
        <div class="px-5 py-3 border-b border-gray-100 dark:border-slate-700/50">
          <label class="text-sm font-medium text-gray-700 dark:text-gray-300">
            <i class="fas fa-eye mr-1.5 text-gray-400"></i>
            Previsualización del email
          </label>
        </div>
        <div class="flex-1 overflow-y-auto p-5">
          <!-- Fake email chrome -->
          <div class="rounded-lg overflow-hidden shadow-sm border border-gray-200 dark:border-slate-700">
            <!-- Fake email header bar -->
            <div class="bg-white dark:bg-slate-800 px-4 py-3 border-b border-gray-100 dark:border-slate-700/50">
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400 w-10">De:</span>
                <span class="text-xs text-gray-700 dark:text-gray-300">{{ account.sender_name || account.email }} &lt;{{ account.email }}&gt;</span>
              </div>
              <div class="flex items-center gap-2 mb-2">
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400 w-10">Para:</span>
                <span class="text-xs text-gray-700 dark:text-gray-300">cliente@ejemplo.com</span>
              </div>
              <div class="flex items-center gap-2">
                <span class="text-xs font-medium text-gray-500 dark:text-gray-400 w-10">Asunto:</span>
                <span class="text-xs font-semibold text-gray-800 dark:text-gray-200">Confirmación de cita</span>
              </div>
            </div>
            <!-- Actual email content preview -->
            <div class="bg-[#f1f5f9]" [innerHTML]="previewHtml()"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div class="flex items-center justify-end gap-3 px-6 py-4 border-t border-gray-200 dark:border-slate-700 bg-gray-50 dark:bg-slate-800/50 flex-shrink-0">
      <button
        class="px-4 py-2.5 text-sm font-medium rounded-lg border border-gray-300 dark:border-slate-600 text-gray-700 dark:text-gray-300 bg-white dark:bg-slate-700 hover:bg-gray-50 dark:hover:bg-slate-600 transition-colors cursor-pointer"
        (click)="close.emit()"
      >
        Cancelar
      </button>
      <button
        class="px-5 py-2.5 text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 dark:focus:ring-offset-slate-800 disabled:opacity-50 disabled:cursor-not-allowed transition-colors cursor-pointer flex items-center gap-2"
        (click)="save()"
        [disabled]="saving()"
      >
        @if (saving()) {
          <i class="fas fa-spinner fa-spin"></i>
        } @else {
          <i class="fas fa-check"></i>
        }
        {{ saving() ? 'Guardando...' : 'Guardar firma' }}
      </button>
    </div>
  </div>
</div>
