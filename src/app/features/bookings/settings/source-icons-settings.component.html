<div class="p-6 max-w-2xl mx-auto">
  <div class="mb-6">
    <h2 class="text-2xl font-semibold text-gray-900">Iconos de origen de reservas</h2>
    <p class="mt-1 text-sm text-gray-500">
      Personaliza el icono y la etiqueta que aparece en el calendario para cada origen de reserva.
    </p>
  </div>

  <!-- Loading state -->
  <div *ngIf="loading()" class="flex items-center justify-center py-12">
    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
    <span class="ml-3 text-gray-500">Cargando configuración...</span>
  </div>

  <!-- Settings form -->
  <div *ngIf="!loading()">
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
      <table class="min-w-full divide-y divide-gray-200">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/4">
              Origen
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/4">
              Icono
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider w-1/3">
              Etiqueta
            </th>
            <th class="px-4 py-3 w-10"></th>
          </tr>
        </thead>
        <tbody class="bg-white divide-y divide-gray-200">
          <tr *ngFor="let row of rows" class="hover:bg-gray-50">
            <!-- Source name -->
            <td class="px-4 py-3">
              <span class="text-sm font-medium text-gray-900 capitalize">{{ row.source }}</span>
            </td>

            <!-- Icon input -->
            <td class="px-4 py-3">
              <input
                type="text"
                [(ngModel)]="row.icon"
                [placeholder]="getDefaultIcon(row.source)"
                class="block w-20 rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500"
                maxlength="10"
              />
            </td>

            <!-- Label input -->
            <td class="px-4 py-3">
              <input
                type="text"
                [(ngModel)]="row.label"
                [placeholder]="getDefaultLabel(row.source)"
                class="block w-full rounded-md border-gray-300 shadow-sm text-sm focus:border-indigo-500 focus:ring-indigo-500"
                maxlength="50"
              />
            </td>

            <!-- Reset button -->
            <td class="px-4 py-3 text-right">
              <button
                *ngIf="row.isCustom"
                (click)="resetToDefault(row.source)"
                class="text-xs text-gray-500 hover:text-gray-700 underline"
                title="Restaurar valor por defecto"
              >
                Reset
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Save button -->
    <div class="mt-6 flex justify-end">
      <button
        (click)="save()"
        [disabled]="saving()"
        class="inline-flex items-center px-4 py-2 bg-indigo-600 text-white text-sm font-medium rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed"
      >
        <svg
          *ngIf="saving()"
          class="animate-spin -ml-1 mr-2 h-4 w-4 text-white"
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
        >
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
        {{ saving() ? 'Guardando...' : 'Guardar cambios' }}
      </button>
    </div>
  </div>
</div>
