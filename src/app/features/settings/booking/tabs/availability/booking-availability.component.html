<div class="py-6 space-y-8">

  <!-- Schedule List -->
  <div
    class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700 divide-y divide-gray-100 dark:divide-gray-700 overflow-hidden"
  >
    @for (day of days(); track day.dayOfWeek) {
      <div 
        class="transition-colors"
        [class]="day.isActive ? 'bg-blue-50/30 dark:bg-blue-900/10' : 'hover:bg-gray-50 dark:hover:bg-gray-750'"
      >
        <div class="p-4 sm:p-6 flex flex-col sm:flex-row gap-4 sm:items-start">
          <!-- Day Toggle -->
          <div class="w-32 flex-shrink-0 pt-2">
            <label class="inline-flex items-center cursor-pointer">
              <div class="relative">
                <input type="checkbox" [(ngModel)]="day.isActive" (change)="triggerAutoSave()" class="sr-only peer" />
                <div
                  class="w-11 h-6 bg-gray-200 peer-focus:outline-none peer-focus:ring-4 peer-focus:ring-blue-300 dark:peer-focus:ring-blue-800 rounded-full peer dark:bg-gray-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-blue-600"
                ></div>
              </div>
              <span 
                class="ml-3 font-medium select-none"
                [class]="day.isActive ? 'text-blue-700 dark:text-blue-300' : 'text-gray-900 dark:text-white'"
              >
                {{ day.name }}
              </span>
            </label>
          </div>
          <!-- Slots -->
          <div class="flex-grow">
            @if (!day.isActive) {
              <div class="pt-2 text-gray-400 text-sm italic">No disponible</div>
            }
            @if (day.isActive) {
              <div class="space-y-3">
                @for (slot of day.slots; track $index; let i = $index) {
                  <div class="flex items-center gap-3 animate-in fade-in slide-in-from-left-2 duration-200">
                    <input
                      type="time"
                      [(ngModel)]="slot.start"
                      (change)="triggerAutoSave()"
                      class="rounded-lg border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white px-2 py-1.5 transition-all"
                    />
                    <span class="text-gray-400">-</span>
                    <input
                      type="time"
                      [(ngModel)]="slot.end"
                      (change)="triggerAutoSave()"
                      class="rounded-lg border-gray-300 dark:border-gray-600 shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm dark:bg-gray-700 dark:text-white px-2 py-1.5 transition-all"
                    />
                    <button
                      (click)="removeSlot(day, i)"
                      class="text-gray-400 hover:text-red-500 transition-colors p-1"
                      title="Eliminar franja"
                    >
                      <i class="fas fa-trash-alt"></i>
                    </button>
                  </div>
                }
                <div class="flex items-center gap-4 pt-1">
                  <button
                    (click)="addSlot(day)"
                    class="text-sm font-medium text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 flex items-center gap-1 transition-colors"
                  >
                    <i class="fas fa-plus"></i> Añadir intervalo
                  </button>
                  <!-- Copy to all weekdays (Only show on Monday) -->
                  @if (day.dayOfWeek === 1) {
                    <button
                      (click)="copyToAll(day)"
                      class="text-sm font-medium text-gray-500 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 flex items-center gap-1 ml-4 transition-colors"
                      title="Copiar a todos los días laborables"
                    >
                      <i class="fas fa-copy"></i> Copiar a L-V
                    </button>
                  }
                </div>
              </div>
            }
          </div>
        </div>
      </div>
    }
  </div>

  <!-- Auto-save status indicator -->
  @if (saving() || saved()) {
    <div
      class="fixed bottom-24 md:bottom-8 right-6 md:right-8 z-30 bg-white dark:bg-gray-800 rounded-full px-4 py-2 shadow-lg border border-gray-200 dark:border-gray-700 flex items-center gap-2 text-sm animate-fade-in pointer-events-none"
    >
      @if (saving()) {
        <span class="animate-spin rounded-full h-3.5 w-3.5 border-2 border-blue-500 border-t-transparent"></span>
        <span class="text-gray-600 dark:text-gray-300">Guardando...</span>
      }
      @if (saved()) {
        <i class="fas fa-check-circle text-green-500"></i>
        <span class="text-green-600 dark:text-green-400">Guardado</span>
      }
    </div>
  }
</div>
