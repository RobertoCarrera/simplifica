<div class="min-h-screen bg-slate-50 dark:bg-slate-900 flex items-center justify-center p-4">
  <div class="bg-white dark:bg-slate-800 rounded-xl shadow-lg p-8 max-w-md w-full text-center">
    @if (processing()) {
      <div class="mb-4">
        <i class="fas fa-spinner fa-spin text-4xl text-emerald-500 mb-4"></i>
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">
          Procesando OAuth...
        </h2>
        <p class="text-gray-500 dark:text-gray-400">
          Completando la conexión con Google. Por favor espera.
        </p>
      </div>
    } @else {
      <div class="mb-4">
        <i class="fas fa-times-circle text-4xl text-red-500 mb-4"></i>
        <h2 class="text-xl font-semibold text-gray-900 dark:text-white mb-2">
          Error de OAuth
        </h2>
        <p class="text-gray-600 dark:text-gray-400 mb-4">
          {{ errorMessage() }}
        </p>
        <p class="text-sm text-gray-400 dark:text-gray-500">
          Esta ventana se cerrará automáticamente...
        </p>
      </div>
    }
  </div>
</div>
