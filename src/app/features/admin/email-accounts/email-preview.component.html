<div class="modal-overlay" (click)="onClose()">
  <div
    class="bg-white dark:bg-slate-800 rounded-xl shadow-xl max-w-3xl w-full mx-4 max-h-[90vh] flex flex-col animate-slide-up"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="flex items-center justify-between p-6 border-b border-gray-100 dark:border-slate-700 flex-shrink-0">
      <h3 class="text-lg font-semibold text-gray-900 dark:text-white">
        <i class="fas fa-eye text-blue-500 mr-2"></i>
        Vista previa: {{ emailTypeLabel }}
      </h3>
      <button
        (click)="onClose()"
        class="p-1.5 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg transition-colors"
      >
        <i class="fas fa-times"></i>
      </button>
    </div>

    <!-- Preview Content -->
    <div class="flex-1 overflow-auto p-6">
      @if (loading()) {
        <div class="flex items-center justify-center py-12">
          <div class="flex items-center gap-3 text-gray-500 dark:text-gray-400">
            <i class="fas fa-spinner animate-spin text-xl"></i>
            <span>Cargando previsualización...</span>
          </div>
        </div>
      } @else {
        <!-- Email Preview Container.
             We pipe the HTML through SafeHtmlPipe which:
               1. Sanitizes via DOMPurify against a strict allow-list (drops
                  <script>, <style>, event handlers, javascript: URLs).
               2. Bypasses Angular's default SecurityContext.HTML sanitizer
                  (which strips <style> tags and many style attributes that
                  legitimate admin-authored email templates need).
             Without this, [innerHTML]="<plain-string>" silently strips the
             embedded styles so the preview shows raw HTML. -->
        <!-- Email preview area.
             Theme adaptation strategy (same approach Gmail / Outlook use
             in dark mode): the SURROUNDING modal adapts to the app's
             ThemeService via Tailwind's dark: variant, but the EMAIL
             itself always renders on a light backdrop. Emails are designed
             for white backgrounds — their templates assume dark text on a
             light surface, so forcing them into a dark background via CSS
             filter invert produces unreadable results. The light card is
             INTENTIONAL: it's the "paper" inside the email envelope. -->
        <div class="rounded-lg p-4 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 transition-colors">
          <div
            class="rounded shadow-sm overflow-auto max-w-full p-4
                   bg-slate-100 transition-colors"
            [innerHTML]="htmlContent() | safeHtml"
          ></div>
        </div>
      }
    </div>

    <!-- Footer -->
    <div class="flex justify-end p-4 border-t border-gray-100 dark:border-slate-700 flex-shrink-0">
      <button
        (click)="onClose()"
        class="px-5 py-2.5 bg-gray-100 dark:bg-slate-700 text-gray-700 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-slate-600 rounded-lg transition-colors font-medium"
      >
        Cerrar
      </button>
    </div>
  </div>
</div>
