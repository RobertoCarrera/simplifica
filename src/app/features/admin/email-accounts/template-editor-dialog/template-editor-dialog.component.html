<div data-testid="template-editor-dialog" class="ted-root">
  <header class="ted-header">
    <h2 class="ted-title" data-testid="template-editor-title">
      {{ title() }}
    </h2>
    <button
      type="button"
      class="ted-close"
      data-testid="template-editor-close"
      (click)="close(false)"
      [attr.aria-label]="'Cerrar'"
    >
      ×
    </button>
  </header>

  <div class="ted-canvas" data-testid="template-editor-canvas">
    <!--
      PR-wysiwyg email-block-editor: the dialog is now SINGLE-COLUMN.
      The block editor IS the preview (every block is rendered visually
      with its real styles via block-visual.ts). The legacy 60% preview
      pane was removed because the canvas = preview in WYSIWYG mode.
      The previewHtml signal + debounced previewTemplate call STILL
      exist (validation/banner triggers, not a visible pane).
    -->
    <section class="ted-form" data-testid="template-editor-form" [formGroup]="form">
      <label class="ted-field">
        <span class="ted-label">Asunto</span>
        <input
          type="text"
          formControlName="subject"
          class="ted-input"
          maxlength="200"
          data-testid="ted-input-subject"
        />
      </label>

      <label class="ted-field">
        <span class="ted-label">Cabecera</span>
        <textarea
          formControlName="header"
          class="ted-textarea ted-textarea--sm"
          rows="3"
          maxlength="2000"
          data-testid="ted-input-header"
        ></textarea>
      </label>

      <!--
        Block editor: flag-gated swap per design id 1946 §7.1.
        When the flag is ON, the legacy TipTap UI is replaced by the
        WYSIWYG canvas. When the flag is OFF (prod default), the
        legacy UI is unchanged.
      -->
      @if (blockEditorEnabled()) {
        @if (deprecationBannerEnabled()) {
          <p
            class="ted-banner ted-banner--deprecation"
            role="note"
            data-testid="ted-deprecation-banner"
          >
            <strong class="ted-banner__title">
              {{ 'emailSettings.templateEditor.blockEditor.deprecationBanner.title' | transloco }}
            </strong>
            <span class="ted-banner__body">
              {{ 'emailSettings.templateEditor.blockEditor.deprecationBanner.body' | transloco }}
            </span>
          </p>
        }

        <app-block-editor
          [data]="data"
          [setting]="data.setting"
          [subject]="form.controls.subject.value"
          [header]="form.controls.header.value"
          (saved)="onBlockSave($event)"
          (migrationFallback)="onMigrationFallback($event)"
        ></app-block-editor>
      } @else {
        <label class="ted-field">
          <span class="ted-label">Texto del botón</span>
          <input
            type="text"
            formControlName="buttonText"
            class="ted-input"
            maxlength="100"
            data-testid="ted-input-buttonText"
          />
        </label>

        <label class="ted-field">
          <span class="ted-label">Cuerpo (HTML)</span>
          <app-tiptap-editor
            data-testid="ted-input-body"
            [content]="form.controls.body.value"
            (contentChange)="form.controls.body.setValue($event); previewLoading.set(true)"
            [placeholder]="'emailSettings.templateEditor.bodyPlaceholder' | transloco"
            [companyId]="data.companyId"
          ></app-tiptap-editor>
          <span class="ted-hint">
            Variables disponibles: <code>{{ '{' }}{{ '{' }}nombre{{ '}' }}{{ '}' }}</code>
          </span>
        </label>
      }
    </section>
  </div>

  <footer class="ted-footer">
    <button
      type="button"
      class="ted-btn ted-btn--ghost"
      (click)="close(false)"
      data-testid="ted-cancel"
    >
      Cancelar
    </button>
    <button
      type="button"
      class="ted-btn ted-btn--primary"
      (click)="saveTemplate()"
      [disabled]="saving() || form.invalid"
      data-testid="ted-save"
    >
      {{ saving() ? 'Guardando…' : 'Guardar' }}
    </button>
  </footer>
</div>
