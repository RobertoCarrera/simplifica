<div class="grid grid-cols-12 gap-4 pb-3 pt-3 m-0">
  <div class="col-span-2">
    <label for="unidades" class="block text-sm font-medium text-gray-700 mb-1">{{ 'services.repairForm.unidades' | transloco }}</label>
    <input
      type="number"
      id="unidades"
      class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm text-center"
      value="1"
      min="1"
      name="unidades"
      required
    />
  </div>
  <div class="col-span-3">
    <label for="tipo_service" class="block text-sm font-medium text-gray-700 mb-1">{{ 'services.repairForm.producto' | transloco }}</label>
    <select
      class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      id="products"
      name="tipo_service"
      required
      [(ngModel)]="selectedProductName"
    >
      <option value="" disabled hidden>{{ 'services.repairForm.eligeProducto' | transloco }}</option>
      @for (product of products; track product) {
        <option [value]="product">{{ product.nombre }}</option>
      }
    </select>
    @if (selectedProduct === true) {
      <div class="text-red-500 text-xs mt-1">{{ 'services.repairForm.productoObligatorio' | transloco }}</div>
    }
  </div>
  <div class="col-span-3">
    <label for="tipo_service" class="block text-sm font-medium text-gray-700 mb-1"
      >{{ 'services.repairForm.reparacion' | transloco }}</label
    >
    <select
      class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      id="categories"
      name="tipo_service"
      required
      [(ngModel)]="selectedCategoryName"
    >
      <option value="" disabled hidden>{{ 'services.repairForm.eligeReparacion' | transloco }}</option>
      @for (work of works; track work) {
        <option [value]="work">{{ work.nombre }}</option>
      }
    </select>
    @if (selectedCategory === true) {
      <div class="text-red-500 text-xs mt-1">{{ 'services.repairForm.categoriaObligatoria' | transloco }}</div>
    }
  </div>
  <div class="col-span-3">
    <label for="vencimiento_service" class="block text-sm font-medium text-gray-700 mb-1"
      >{{ 'services.repairForm.vencimiento' | transloco }}</label
    >
    <input
      type="text"
      class="block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
      id="vencimiento_service"
      [placeholder]="'services.repairForm.introducirVencimiento' | transloco"
      name="vencimiento_service"
      required
    />
    @if (selectedDueDate === true) {
      <div class="text-red-500 text-xs mt-1">{{ 'services.repairForm.vencimientoObligatorio' | transloco }}</div>
    }
  </div>
  <div class="col-span-1 flex items-end justify-center pb-1">
    <button class="text-red-500 hover:text-red-700 transition-colors" (click)="removeProduct()">
      <i class="bi bi-x-circle text-xl"></i>
    </button>
  </div>
</div>
