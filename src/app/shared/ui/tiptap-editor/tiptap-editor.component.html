<div class="editor-container" *ngIf="editor">
    <div class="editor-toolbar">
        <!-- Text Style -->
        <button class="toolbar-btn" [class.active]="editor.isActive('bold')" (click)="toggleBold()"
            title="Negrita (Ctrl+B)">
            <i class="fas fa-bold"></i>
        </button>
        <button class="toolbar-btn" [class.active]="editor.isActive('italic')" (click)="toggleItalic()"
            title="Cursiva (Ctrl+I)">
            <i class="fas fa-italic"></i>
        </button>
        <button class="toolbar-btn" [class.active]="editor.isActive('strike')" (click)="toggleStrike()" title="Tachado">
            <i class="fas fa-strikethrough"></i>
        </button>

        <div class="separator"></div>

        <!-- Headings -->
        <button class="toolbar-btn" [class.active]="editor.isActive('heading', { level: 1 })" (click)="setHeading(1)"
            title="H1">
            <i class="fas fa-heading"></i>1
        </button>
        <button class="toolbar-btn" [class.active]="editor.isActive('heading', { level: 2 })" (click)="setHeading(2)"
            title="H2">
            <i class="fas fa-heading"></i>2
        </button>

        <div class="separator"></div>

        <!-- Lists -->
        <button class="toolbar-btn" [class.active]="editor.isActive('bulletList')" (click)="toggleBulletList()"
            title="Lista con viñetas">
            <i class="fas fa-list-ul"></i>
        </button>
        <button class="toolbar-btn" [class.active]="editor.isActive('orderedList')" (click)="toggleOrderedList()"
            title="Lista numerada">
            <i class="fas fa-list-ol"></i>
        </button>

        <div class="separator"></div>

        <!-- Insert -->
        <button class="toolbar-btn" [class.active]="editor.isActive('link')" (click)="addLink()"
            title="Insertar enlace">
            <i class="fas fa-link"></i>
        </button>
        <!-- Future: Image upload handling -->
    </div>

    <div class="editor-content-wrapper">
        <tiptap-editor [editor]="editor"></tiptap-editor>
    </div>

    <!-- Custom Link Prompt Overlay -->
    <div class="fixed inset-0 bg-slate-900/40 z-[100] flex items-center justify-center p-4 backdrop-blur-sm" *ngIf="showLinkPrompt">
        <div class="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-6 rounded-2xl w-full max-w-sm shadow-2xl flex flex-col gap-4">
            <h4 class="m-0 text-lg font-semibold text-slate-900 dark:text-slate-100">Añadir URL</h4>
            <input type="text" [(ngModel)]="linkUrl" placeholder="https://..." (keyup.enter)="confirmLink()" autofocus 
                   class="w-full px-4 py-2.5 border border-slate-200 dark:border-slate-700 rounded-xl bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-slate-100 text-sm focus:outline-none focus:border-orange-500 focus:ring-2 focus:ring-orange-500/20 transition-all placeholder:text-slate-400 dark:placeholder:text-slate-500">
            <div class="flex justify-end gap-2 mt-2">
                <button class="px-4 py-2 rounded-xl text-sm font-medium text-slate-600 hover:bg-slate-100 dark:text-slate-300 dark:hover:bg-slate-700/50 transition-colors" (click)="cancelLink()">Cancelar</button>
                <button class="px-4 py-2 rounded-xl text-sm font-medium bg-orange-600 text-white hover:bg-orange-700 transition-colors flex items-center gap-2 shadow-sm" (click)="confirmLink()"><i class="fas fa-check"></i> Aplicar</button>
            </div>
        </div>
    </div>
</div>
