<!--
  Custom Select — replaces native <select>
  UX: search/filter, clear selection, keyboard nav
  Accessibility: ARIA combobox/listbox pattern, aria-activedescendant, full keyboard
-->
<div
  class="custom-select"
  [class.custom-select--open]="isOpen"
  [class.custom-select--error]="hasError"
  [class.custom-select--disabled]="disabled"
  [class.custom-select--sm]="size === 'sm'"
  [class.custom-select--md]="size === 'md'"
  [class.custom-select--lg]="size === 'lg'"
  [class.custom-select--searchable]="searchable"
  [class.custom-select--has-value]="hasValue"
  role="combobox"
  [attr.aria-expanded]="isOpen"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-label]="placeholder"
  [attr.aria-activedescendant]="activeIndex >= 0 ? 'custom-select-opt-' + activeIndex : null"
  aria-controls="custom-select-listbox">

  <!-- Trigger / Display -->
  <button
    #triggerButton
    type="button"
    class="custom-select__trigger"
    [class.custom-select__trigger--placeholder]="showPlaceholder"
    [class.custom-select__trigger--error]="hasError"
    [class.custom-select__trigger--has-clear]="hasValue && clearable"
    [disabled]="disabled"
    (click)="toggle()"
    (keydown)="onTriggerKeydown($event)"
    [attr.aria-labelledby]="'custom-select-label'">

    <span class="custom-select__value" id="custom-select-label">
      <ng-container *ngIf="showPlaceholder; else selectedText">
        {{ placeholder }}
      </ng-container>
      <ng-template #selectedText>
        {{ selectedLabel }}
      </ng-template>
    </span>

    <!-- Clear button (visible when value is set and clearable) -->
    <button
      *ngIf="hasValue && clearable"
      type="button"
      class="custom-select__clear"
      [disabled]="disabled"
      (click)="clear($event)"
      (keydown)="$event.stopPropagation()"
      [attr.aria-label]="'Limpiar selección'"
      tabindex="-1">
      <svg
        class="custom-select__clear-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
        aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z"
          clip-rule="evenodd" />
      </svg>
    </button>

    <!-- Custom Arrow -->
    <span class="custom-select__arrow" aria-hidden="true">
      <svg
        class="custom-select__chevron"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor">
        <path
          fill-rule="evenodd"
          d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z"
          clip-rule="evenodd" />
      </svg>
    </span>
  </button>

  <!-- Dropdown Panel -->
  <div
    *ngIf="isOpen"
    @dropdownPanel
    class="custom-select__panel"
    role="listbox"
    id="custom-select-listbox"
    [attr.aria-label]="placeholder"
    (keydown)="onDropdownKeydown($event)"
    #optionsContainer>

    <!-- Search input (only when searchable) -->
    <div *ngIf="searchable" class="custom-select__search" (keydown)="onSearchKeydown($event)">
      <svg
        class="custom-select__search-icon"
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 20 20"
        fill="currentColor"
        aria-hidden="true">
        <path
          fill-rule="evenodd"
          d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z"
          clip-rule="evenodd" />
      </svg>
      <input
        #searchInput
        type="text"
        class="custom-select__search-input"
        role="searchbox"
        [attr.aria-label]="searchPlaceholder"
        [placeholder]="searchPlaceholder"
        [(ngModel)]="searchTerm"
        (ngModelChange)="onSearchInput()"
        (keydown)="onSearchKeydown($event)"
        autocomplete="off" />
    </div>

    <!-- Options -->
    <ng-container *ngIf="filteredOptions().length > 0; else emptyResults">
      <div
        *ngFor="let option of filteredOptions(); trackBy: trackByValue; let i = index"
        class="custom-select__option"
        [class.custom-select__option--selected]="option.value === value"
        [class.custom-select__option--disabled]="option.disabled"
        [class.custom-select__option--active]="i === activeIndex"
        role="option"
        [id]="'custom-select-opt-' + i"
        [attr.aria-selected]="option.value === value"
        [attr.aria-disabled]="option.disabled || null"
        (click)="selectOption(option)">

        <span class="custom-select__option-label">{{ option.label }}</span>

        <!-- Checkmark for selected -->
        <svg
          *ngIf="option.value === value"
          class="custom-select__check"
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 20 20"
          fill="currentColor"
          aria-hidden="true">
          <path
            fill-rule="evenodd"
            d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
            clip-rule="evenodd" />
        </svg>
      </div>
    </ng-container>

    <!-- Empty states -->
    <ng-template #emptyResults>
      <div *ngIf="!searchable || !searchTerm().trim(); else noSearchResults" class="custom-select__empty">
        {{ noOptionsText }}
      </div>
      <ng-template #noSearchResults>
        <div class="custom-select__empty">
          {{ emptySearchText }}
        </div>
      </ng-template>
    </ng-template>
  </div>
</div>
