@if (visible) {
  <div class="app-modal-overlay">
    <div class="app-modal-backdrop" (click)="backdropClick()"></div>
    <div
      class="app-modal-panel"
      [class.dark]="themeService.currentTheme() === 'dark'"
      role="dialog"
      aria-modal="true"
      [style.max-width]="maxWidth"
    >
      <ng-content></ng-content>
    </div>
  </div>
}
